<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeterSphere - 开源持续测试平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4eaf1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            display: flex;
            max-width: 1200px;
            width: 90%;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #6b46c1 0%, #805ad5 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .logo-section {
            text-align: center;
            z-index: 1;
        }

        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: white;
            margin-bottom: 20px;
        }

        .hero-image {
            width: 100%;
            max-width: 400px;
            margin: 40px 0;
            z-index: 1;
        }

        .hero-slogan {
            font-size: 20px;
            color: white;
            text-align: center;
            z-index: 1;
        }

        .right-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .login-form-container {
            width: 100%;
            max-width: 400px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #6b46c1 0%, #805ad5 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .form-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .form-subtitle {
            color: #666;
            font-size: 14px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #6b46c1;
            box-shadow: 0 0 0 3px rgba(107, 70, 193, 0.1);
        }

        .login-btn {
            background: linear-gradient(135deg, #6b46c1 0%, #805ad5 100%);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(107, 70, 193, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .demo-info {
            margin-top: 20px;
            padding: 12px;
            background: #f7fafc;
            border-radius: 8px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }

        .demo-info strong {
            color: #6b46c1;
        }

        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                border-radius: 0;
            }

            .left-panel {
                padding: 30px 20px;
            }

            .right-panel {
                padding: 30px 20px;
            }

            .hero-image {
                max-width: 250px;
                margin: 20px 0;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="left-panel">
            <div class="logo-section">
                <div class="logo-text">因为热爱 快速成长</div>
            </div>
            <img src="frontend/src/assets/image.png" alt="MeterSphere" class="hero-image">
            <div class="hero-slogan">开源持续测试平台</div>
        </div>
        <div class="right-panel">
            <div class="login-form-container">
                <div class="form-header">
                    <div class="form-logo">MS</div>
                    <h2 class="form-title">MeterSphere</h2>
                    <p class="form-subtitle">开源持续测试工具</p>
                </div>
                <form class="login-form">
                    <div class="form-group">
                        <label for="username">账号</label>
                        <input type="text" id="username" name="username" value="admin" placeholder="请输入账号">
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" value="1" placeholder="请输入密码">
                    </div>
                    <button type="submit" class="login-btn">登录</button>
                    <div class="demo-info">
                        用户名: <strong>admin</strong> 密码: <strong>1</strong>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.querySelector('.login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 这里可以添加登录逻辑
            console.log('登录信息:', { username, password });
            alert('登录功能已触发，用户名: ' + username + '，密码: ' + password);
        });
    </script>
</body>
</html>
